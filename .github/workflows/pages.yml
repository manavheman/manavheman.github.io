name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          A327F9: ${{ secrets.A327F9 }}
          B43FAF: ${{ secrets.B43FAF }}
        run: |
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('A327F9', '')
          sec_b = os.environ.get('B43FAF', '')
          target = pathlib.Path('index.html')
          before = target.read_text(encoding='utf-8')
          after = before
          if sec_a:
              after = after.replace('<!-- ea171f8d4baff06220ab92 -->', sec_a)
          if sec_b:
              after = after.replace('<!-- 5ca79d53e822ae91ad65288343ff3a77f6bbe6 -->', sec_b)
          if after == before and (sec_a or sec_b):
              sys.exit(1)
          if after != before:
              target.write_text(after, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
